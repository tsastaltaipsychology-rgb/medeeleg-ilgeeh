<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мэдээлэл Илгээх</title>
<style>
  :root {
    --accent: #5F5E5A; --accent-h: #444441; --dark: #1a1a1a;
    --card: #222222; --border: #333333; --text: #E0DED8; --muted: #888780;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  .header { padding: 24px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .hicon { width: 38px; height: 38px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .htitle { font-size: 17px; font-weight: 600; color: var(--text); }
  .hsub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: monospace; }
  .body { flex: 1; padding: 28px; max-width: 520px; width: 100%; margin: 0 auto; }
  .notice { background: rgba(95,94,90,0.18); border: 1px solid rgba(95,94,90,0.35); border-radius: 8px; padding: 13px 15px; font-size: 13px; color: #D3D1C7; margin-bottom: 24px; line-height: 1.5; }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  .opt { font-size: 10px; background: var(--border); color: var(--muted); padding: 2px 6px; border-radius: 4px; margin-left: 5px; text-transform: none; letter-spacing: 0; vertical-align: middle; font-weight: 400; }
  select, input[type="text"], input[type="date"], textarea {
    width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: inherit; font-size: 14px;
    padding: 11px 13px; outline: none; transition: border-color 0.2s;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--accent); }
  select option { background: #222; }
  textarea { resize: vertical; min-height: 110px; line-height: 1.6; }
  .anon-row { display: flex; align-items: center; gap: 11px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 13px 15px; cursor: pointer; transition: border-color 0.2s; user-select: none; }
  .anon-row:hover { border-color: #555; }
  .anon-row.on { border-color: var(--accent); }
  .chk { width: 19px; height: 19px; border: 2px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .anon-row.on .chk { background: var(--accent); border-color: var(--accent); }
  .chk svg { display: none; }
  .anon-row.on .chk svg { display: block; }
  .al { font-size: 14px; color: var(--text); }
  .ad { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .btn { width: 100%; background: var(--accent); color: #F1EFE8; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 6px; transition: background 0.2s; }
  .btn:hover { background: var(--accent-h); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .sending { display: none; align-items: center; justify-content: center; gap: 10px; font-size: 14px; color: var(--muted); padding: 14px; }
  .spinner { width: 17px; height: 17px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="header">
    <div class="hicon">🛡️</div>
    <div>
      <div class="htitle">Мэдээлэл Илгээх</div>
      <div class="hsub">Нууцлалтай · Аюулгүй</div>
    </div>
  </div>
  <div class="body">
    <div class="notice">⚠️ Таны мэдээлэл нууцлалтайгаар хүлээн авагдана. Нэргүй илгээх сонголт байна.</div>
    <div class="field">
      <label>Дээрэлхэлтийн төрөл</label>
      <select id="type">
        <option value="">— Сонгоно уу —</option>
        <option>Бие махбодын дээрэлхэлт</option>
        <option>Цахим дээрэлхэлт</option>
        <option>Бэлгийн хүчирхийлэл</option>
        <option>Үл хайхрах</option>
        <option>Бусад</option>
      </select>
    </div>
    <div class="field">
      <label>Болсон огноо <span class="opt">заавал биш</span></label>
      <input type="date" id="date">
    </div>
    <div class="field">
      <label>Болсон газар <span class="opt">заавал биш</span></label>
      <input type="text" id="location" placeholder="Жишээ: 3-р анги, гадна талбай...">
    </div>
    <div class="field">
      <label>Юу болсон бэ?</label>
      <textarea id="description" placeholder="Болсон явдлыг дэлгэрэнгүй бичнэ үү..."></textarea>
    </div>
    <div class="field">
      <label>Нэргүй илгээх</label>
      <div class="anon-row" id="anonToggle" onclick="toggleAnon()">
        <div class="chk">
          <svg width="11" height="8" viewBox="0 0 11 8" fill="none">
            <path d="M1 4L4 7L10 1" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="al">Нэргүй илгээх</div>
          <div class="ad">Нэрийг таны мэдүүлэгт оруулахгүй</div>
        </div>
      </div>
    </div>
    <div class="field" id="nameField">
      <label>Таны нэр <span class="opt">заавал биш</span></label>
      <input type="text" id="name" placeholder="Нэр оруулах...">
    </div>
    <div class="sending" id="sending">
      <div class="spinner"></div>
      <span>Илгээж байна...</span>
    </div>
    <button class="btn" id="submitBtn" onclick="submitReport()">Мэдээлэл илгээх →</button>
  </div>
<script>
  const EMAILS = ['Badamtsetseg3kqwv@moes.edu.mn', 'Ulziisaihan7020@moes.edu.mn'];
  let isAnon = false;

  function toggleAnon() {
    isAnon = !isAnon;
    document.getElementById('anonToggle').classList.toggle('on', isAnon);
    document.getElementById('nameField').style.display = isAnon ? 'none' : 'block';
  }

  function submitReport() {
    const type = document.getElementById('type').value;
    const description = document.getElementById('description').value.trim();
    if (!type) { alert('Дээрэлхэлтийн төрлийг сонгоно уу'); return; }
    if (!description) { alert('Болсон явдлыг тайлбарлана уу'); return; }

    const date = document.getElementById('date').value;
    const location = document.getElementById('location').value;
    const name = isAnon ? 'Нэргүй' : (document.getElementById('name').value.trim() || 'Нэр оруулаагүй');

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('sending').style.display = 'flex';

    const subject = encodeURIComponent('📩 Мэдээлэл — ' + type);
    const body = encodeURIComponent(
      '═══════════════════════════\nМЭДЭЭЛЭЛ\n═══════════════════════════\n\n' +
      '📋 Төрөл: ' + type + '\n' +
      '📅 Огноо: ' + (date || 'Тодорхойгүй') + '\n' +
      '📍 Газар: ' + (location || 'Тодорхойгүй') + '\n' +
      '👤 Мэдүүлэгч: ' + name + '\n\n' +
      '📝 Тайлбар:\n' + description + '\n\n' +
      '───────────────────────────\nИлгээсэн: ' + new Date().toLocaleString('mn-MN')
    );

    setTimeout(() => {
      document.getElementById('sending').style.display = 'none';
      document.getElementById('submitBtn').disabled = false;
      window.location.href = 'mailto:' + EMAILS.join(',') + '?subject=' + subject + '&body=' + body;
      setTimeout(() => { window.location.href = 'success.html'; }, 800);
    }, 1200);
  }
</script>
</body>
</html>
