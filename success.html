<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Амжилттай илгээгдлээ</title>
<style>
  :root { --accent: #5F5E5A; --dark: #1a1a1a; --border: #333333; --text: #E0DED8; --muted: #888780; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .wrap { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 40px 32px; }
  .icon { width: 72px; height: 72px; background: rgba(76,175,80,0.15); border: 2px solid #4CAF50; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 24px; animation: pop 0.4s ease; }
  @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
  .title { font-size: 22px; font-weight: 600; margin-bottom: 10px; }
  .desc { font-size: 14px; color: var(--muted); max-width: 320px; line-height: 1.6; }
  .back-btn { margin-top: 32px; background: transparent; border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 11px 24px; font-size: 14px; font-family: inherit; cursor: pointer; text-decoration: none; display: inline-block; transition: border-color 0.2s; }
  .back-btn:hover { border-color: #555; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="icon">✓</div>
    <div class="title">Мэдээлэл амжилттай илгээгдлээ</div>
    <div class="desc">Таны мэдээлэлийг хүлээн авлаа. Хариуцлагатай этгээд ойрын хугацаанд хариу өгнө.</div>
    <a class="back-btn" href="index.html">← Буцах</a>
  </div>
</body>
</html>
